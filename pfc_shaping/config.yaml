# ============================================================
# config.yaml — PFC Shaping 15min FMV SA
# ============================================================

# ── Connexion Databricks ─────────────────────────────────────
# Recommandé : stocker token dans variable d'environnement DATABRICKS_TOKEN
# plutôt qu'ici (ne jamais committer un token en clair)
databricks:
  enabled:    true   # true = actif pour forwards EEX + hydro (pas EPEX/load)
  host:       null   # ex. "adb-1234567890123456.7.azuredatabricks.net"
             #      ou variable d'env DATABRICKS_HOST
  http_path:  null   # ex. "/sql/1.0/warehouses/abcdef1234567890"
             #      ou variable d'env DATABRICKS_HTTP_PATH
  token:      null   # ou variable d'env DATABRICKS_TOKEN (recommandé)

  # Catalog et schema Unity Catalog
  catalog:    "fmv_prod"     # à adapter
  schema:     "market_data"  # à adapter

  # Noms des tables (sans catalog/schema — ils sont préfixés automatiquement)
  tables:
    epex_15min:     "epex_spot_15min"      # prix EPEX 15min
    swissgrid_load: "swissgrid_load_15min" # charge réseau CH
    renewables:     "generation_15min"     # production solaire + éolienne
    eex_forwards:   "eex_forwards_euler"   # forwards calibrés par EULER
    hydro_reservoir_levels: "hydro_reservoir_weekly" # niveaux réservoirs SFOE/BFE

# ── energy-charts.info (Fraunhofer ISE) ────────────────────
# API publique, sans authentification.
# Source PRIMAIRE unifiée : prix EPEX + load + generation CH.
# Agrège données ENTSO-E + SMARD, très fiable.
# Licence CC BY 4.0.
energy_charts:
  enabled:       true          # true = source primaire pour tout (prix + load + gen)

# ── SMARD.de (Bundesnetzagentur) ───────────────────────────
# API publique, pas de clé nécessaire.
# Fallback prix EPEX CH si energy-charts indisponible.
smard:
  enabled:       true          # true = fallback prix EPEX
  # Filtres : 259 = prix CH, 4169 = prix DE-LU

# ── API ENTSO-E Transparency ───────────────────────────────
# Fallback pour load + generation si energy-charts indisponible.
# Clé API : variable d'environnement ENTSOE_API_KEY (fichier .env recommandé)
entsoe:
  enabled:       true          # true = fallback load/generation
  country_code:  "CH"          # zone de prix principale
  # Pays voisins pour les flux transfrontaliers (optionnel, futur)
  neighbors:
    - "FR"
    - "DE_LU"
    - "AT"
    - "IT_NORD"

# ── Chemins locaux (cache + artefacts) ──────────────────────
paths:
  # Cache Parquet local (évite requêtes répétées, permet offline)
  epex_parquet:   "data/epex_15min.parquet"
  entso_parquet:  "data/entso_15min.parquet"
  hydro_parquet:  "data/hydro_reservoir.parquet"

  # Modèles calibrés
  model_dir:      "model/artifacts"

  # Exports vers EULER
  output_dir:     "output"
  duckdb_path:    "data/pfc_local.duckdb"

  # Dossier benchmark HFC OMPEX (comparaison optionnelle)
  hfc_benchmark_dir: "H:\\Energy\\GeCom\\MARCHE & NEGOCE\\Prix\\Analyse HFC\\HFC test\\ER -HFC_OMPEX_15min"

# —— Forwards EEX (source desk quotidienne) ——————————————————————————————
forwards:
  # Source prioritaire: rapport XLSX quotidien du desk.
  # Si le lecteur H: n'est pas monté, on tente le chemin UNC.
  eex_report_path: "H:\\Energy\\GeCom\\MARCHE & NEGOCE\\Prix\\EEX - ER\\Price_Report_EEX.xlsx"
  eex_report_path_unc: "\\\\fmvfs1\\data\\Energy\\GeCom\\MARCHE & NEGOCE\\Prix\\EEX - ER\\Price_Report_EEX.xlsx"
  eex_markets: ["CH", "DE"]  # marchés à produire quotidiennement
  eex_market: "CH"      # fallback compat
  eex_as_of_date: null  # null => dernière date non nulle disponible

# ── Paramètres du modèle ────────────────────────────────────
model:
  # Lookback historique pour la calibration (mois)
  lookback_months: 36

  # Paramètre de lissage gaussien de f_H (en heures)
  gaussian_sigma: 0.5

  # Nombre de tirages bootstrap pour les IC
  n_boot: 500

  # Horizon de la PFC (jours)
  horizon_days: 1095  # 3 * 365

  # Test de Chow : taille de chaque sous-fenêtre (mois)
  chow_window_months: 12

  # Heures à forte variance intra-horaire (correction exogène activée)
  heures_rampe: [6, 7, 8, 9, 10, 17, 18, 19, 20]

  # Calibration arbitrage-free (Maximum Smoothness)
  smoothness_weight: 1.0    # poids de la pénalité de lissage
  calibration_tol: 0.01     # tolérance convergence (€/MWh)
  calibration_fallback_to_raw: true  # si non convergence, garder P_raw (plus robuste en prod)

  # Score de confiance [0,1] decroissant avec l'horizon
  confidence_6m: 1.0     # <= 6 mois
  confidence_12m: 0.85   # 6-12 mois
  confidence_24m: 0.65   # 12-24 mois
  confidence_36m: 0.45   # > 24 mois

# —— Réseau / SSL entreprise ————————————————————————————————————————————————————
ssl:
  # Chemin vers bundle CA corporate (PEM). Si null, comportement requests par défaut.
  ca_bundle: "C:\\certs\\fmvsa-proxy-ca.crt"

# ── Niveaux de base B (€/MWh) ───────────────────────────────
# Ces prix sont chargés automatiquement depuis Databricks
# (table eex_forwards_euler, dernier run EULER disponible).
# La section base_prices ci-dessous sert de FALLBACK UNIQUEMENT
# si Databricks est inaccessible.
base_prices_fallback:
  "2025": 75.00
  "2026": 72.00
  "2027": 70.00

# ── Variantes PFC (flavors) ────────────────────────────────
# 3 variantes métier dérivées de la PFC mid-market :
#   mid_market  — référence P&L, suivi de risque, reporting
#   client      — pricing offres grands consommateurs (conservateur)
#   production  — dispatch hydro, water value, optionalité
flavors:
  enabled: true
  # Spread bid/ask par horizon (EUR/MWh) — PFC Client
  spread_by_horizon:
    6:   1.0    # M+1..M+6
    12:  1.5    # M+7..M+12
    24:  2.5    # Y+2
    36:  3.5    # Y+3
  # Prime de capture hydro par horizon (EUR/MWh) — PFC Production
  capture_premium:
    6:   0.8
    12:  0.6
    24:  0.4
    36:  0.3
  # Percentile IC utilisé comme plancher prix client
  client_percentile: "p90"

# ── Paramètres d'export ─────────────────────────────────────
export:
  # Timezone locale pour les timestamps CSV vers EULER
  tz_local: "Europe/Zurich"

  # Séparateur CSV
  sep: ";"

  # Colonnes exportées
  columns:
    - price_shape
    - p10
    - p90
    - profile_type
    - confidence
    - calibrated

# —— Quality gates (prod) ————————————————————————————————————————
quality:
  fail_on_benchmark: true
  max_mae_eur_mwh: 20.0
  max_rmse_eur_mwh: 26.0
  max_abs_bias_eur_mwh: 5.0
